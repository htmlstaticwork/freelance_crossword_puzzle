<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account | Cross Purposes</title>
  <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect fill='%23ffd700' width='32' height='32'/><rect fill='%23000' x='2' y='2' width='8' height='8'/><rect fill='%23000' x='12' y='2' width='8' height='8'/><rect fill='%23000' x='22' y='2' width='8' height='8'/><rect fill='%23000' x='2' y='12' width='8' height='8'/><rect fill='%23000' x='12' y='12' width='8' height='8'/><rect fill='%23000' x='22' y='12' width='8' height='8'/><rect fill='%23000' x='2' y='22' width='8' height='8'/><rect fill='%23000' x='12' y='22' width='8' height='8'/><rect fill='%23000' x='22' y='22' width='8' height='8'/><rect fill='%23ffd700' x='6' y='6' width='4' height='4'/><rect fill='%23ffd700' x='16' y='6' width='4' height='4'/><rect fill='%23ffd700' x='26' y='6' width='4' height='4'/><rect fill='%23ffd700' x='6' y='16' width='4' height='4'/><rect fill='%23ffd700' x='16' y='16' width='4' height='4'/><rect fill='%23ffd700' x='26' y='16' width='4' height='4'/><rect fill='%23ffd700' x='6' y='26' width='4' height='4'/><rect fill='%23ffd700' x='16' y='26' width='4' height='4'/><rect fill='%23ffd700' x='26' y='26' width='4' height='4'/></svg>">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap"
    rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="auth.css">
</head>

<body class="auth-page">

  <div class="auth-card reveal">
    <!-- Top Right Controls -->
    <div class="top-controls">
      <div id="rtl-toggle" class="control-btn" title="Toggle RTL">
        <i data-lucide="languages"></i>
      </div>
      <div id="theme-toggle" class="control-btn" title="Toggle Theme">
        <i data-lucide="moon"></i>
      </div>
    </div>

    <div class="logo-container">
      <a href="index.html" class="logo-link">
        <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
          <rect fill="#ffd700" width="32" height="32" rx="6"/>
          <rect fill="#000" x="2" y="2" width="8" height="8"/>
          <rect fill="#000" x="12" y="2" width="8" height="8"/>
          <rect fill="#000" x="22" y="2" width="8" height="8"/>
          <rect fill="#000" x="2" y="12" width="8" height="8"/>
          <rect fill="#000" x="12" y="12" width="8" height="8"/>
          <rect fill="#000" x="22" y="12" width="8" height="8"/>
          <rect fill="#000" x="2" y="22" width="8" height="8"/>
          <rect fill="#000" x="12" y="22" width="8" height="8"/>
          <rect fill="#000" x="22" y="22" width="8" height="8"/>
          <rect fill="#ffd700" x="6" y="6" width="4" height="4"/>
          <rect fill="#ffd700" x="16" y="6" width="4" height="4"/>
          <rect fill="#ffd700" x="26" y="6" width="4" height="4"/>
          <rect fill="#ffd700" x="6" y="16" width="4" height="4"/>
          <rect fill="#ffd700" x="16" y="16" width="4" height="4"/>
          <rect fill="#ffd700" x="26" y="16" width="4" height="4"/>
          <rect fill="#ffd700" x="6" y="26" width="4" height="4"/>
          <rect fill="#ffd700" x="16" y="26" width="4" height="4"/>
          <rect fill="#ffd700" x="26" y="26" width="4" height="4"/>
        </svg>
        <span class="logo">Cross Purposes</span>
      </a>
    </div>

    <h2>Join the Grid</h2>
    <p class="subtitle">Start your cruciverbalist journey today.</p>

    <form class="auth-form" action="#">
      <div class="form-group">
        <label for="name">Full Name</label>
        <div class="input-wrapper">
          <input type="text" id="name" placeholder="Enter your full name" required>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <input type="email" id="email" placeholder="example@domain.com" required>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <input type="password" id="password" placeholder="Create a password" required>
          <span class="toggle-password">
            <i data-lucide="eye"></i>
          </span>
        </div>
      </div>

      <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <div class="input-wrapper">
          <input type="password" id="confirm-password" placeholder="Confirm your password" required>
          <span class="toggle-password">
            <i data-lucide="eye"></i>
          </span>
        </div>
      </div>

      <div class="agreement-group">
        <input type="checkbox" id="terms" required>
        <label for="terms">I agree to the <a href="#">Terms</a> and <a href="#">Privacy Policy</a></label>
      </div>

      <button type="submit" class="btn-cta">Create Account</button>
    </form>

    <div class="divider">
      <span>Or sign up with</span>
    </div>

    <div class="social-options">
      <a href="#" class="btn-social google">
        <i class="fab fa-google"></i>
        <span>Sign up with Google</span>
      </a>
      <a href="#" class="btn-social apple">
        <i class="fab fa-apple"></i>
        <span>Sign up with Apple</span>
      </a>
    </div>

    <p class="auth-switch">
      Already have an account? <a href="login.html">Sign In instead</a>
    </p>
  </div>

  <script src="auth.js"></script>
</body>

</html>
