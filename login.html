<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Cross Purposes</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap"
    rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="auth.css">
</head>

<body class="auth-page">

  <div class="auth-card reveal">
    <!-- Top Right Controls -->
    <div class="top-controls">
      <div id="rtl-toggle" class="control-btn" title="Toggle RTL">
        <i data-lucide="languages"></i>
      </div>
      <div id="theme-toggle" class="control-btn" title="Toggle Theme">
        <i data-lucide="moon"></i>
      </div>
    </div>

    <div class="logo-container">
      <a href="index.html" class="logo">Cross Purposes</a>
    </div>

    <h2>Welcome Back</h2>
    <p class="subtitle">Please enter your credentials to log in.</p>

    <form class="auth-form" action="#">
      <div class="form-group">
        <label for="username">Email or Username</label>
        <div class="input-wrapper">
          <input type="text" id="username" placeholder="Enter your email" required>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <input type="password" id="password" placeholder="Enter your password" required>
          <span class="toggle-password">
            <i data-lucide="eye"></i>
          </span>
        </div>
      </div>

      <div class="form-options">
        <label class="checkbox-group">
          <input type="checkbox" name="remember">
          <span>Remember me</span>
        </label>
        <a href="#" class="forgot-password">Forgot Password?</a>
      </div>

      <button type="submit" class="btn-cta">Sign In</button>
    </form>

    <div class="divider">
      <span>Or continue with</span>
    </div>

    <div class="social-options">
      <a href="#" class="btn-social">
        <i class="fab fa-google"></i>
        <span>Sign in with Google</span>
      </a>
      <a href="#" class="btn-social">
        <i class="fab fa-apple"></i>
        <span>Sign in with Apple</span>
      </a>
    </div>

    <p class="auth-switch">
      Don't have an account? <a href="signup.html">Create an Account</a>
    </p>
  </div>

  <script src="auth.js"></script>
</body>

</html>
